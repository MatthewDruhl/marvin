  <text x="60" y="887" font-size="13" font-weight="600" fill="#92400e">Key Changes from Current Process</text>
  <text x="60" y="907" font-size="12" fill="#78350f">&#x2022; HubSpot pushes requests directly into Quote System (no data entry)</text>
  <text x="60" y="925" font-size="12" fill="#78350f">&#x2022; Susie still gets email — keeps her pulse on the process</text>
  <text x="60" y="943" font-size="12" fill="#78350f">&#x2022; Manual release gives control over when quotes are processed</text>
  <text x="60" y="961" font-size="12" fill="#78350f">&#x2022; Bob shifts from doing the work to reviewing system output</text>
  <text x="60" y="979" font-size="12" fill="#78350f">&#x2022; Susie can run quotes when Bob is out of office</text>
  <text x="60" y="997" font-size="12" fill="#78350f">&#x2022; GA drawing matching and quote generation are automatic</text>
