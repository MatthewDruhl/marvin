<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="960" height="400" fill="#ffffff"/>

  <!-- title -->
  <text x="480" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a">MARVIN Core Flow</text>
  <text x="480" y="62" text-anchor="middle" font-size="12" fill="#64748b">Smoke test — fireworks-tech-graph</text>

  <!-- User node -->
  <rect x="60" y="170" width="140" height="72" rx="12" ry="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="130" y="202" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">User</text>
  <text x="130" y="222" text-anchor="middle" font-size="11" fill="#64748b">Matt</text>

  <!-- MARVIN core -->
  <rect x="380" y="160" width="200" height="92" rx="14" ry="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#softShadow)"/>
  <text x="480" y="196" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">MARVIN</text>
  <text x="480" y="218" text-anchor="middle" font-size="11" fill="#64748b">AI Chief of Staff</text>
  <text x="480" y="234" text-anchor="middle" font-size="10" fill="#94a3b8">Claude Code + skills</text>

  <!-- Gmail node -->
  <rect x="760" y="70" width="160" height="64" rx="10" ry="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="840" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Gmail</text>
  <text x="840" y="116" text-anchor="middle" font-size="10" fill="#64748b">job responses, VA mail</text>

  <!-- State Files node -->
  <rect x="760" y="175" width="160" height="64" rx="10" ry="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="840" y="203" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">State Files</text>
  <text x="840" y="221" text-anchor="middle" font-size="10" fill="#64748b">current.md, todos.md</text>

  <!-- Job Tracking node -->
  <rect x="760" y="280" width="160" height="64" rx="10" ry="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="840" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Job Tracking</text>
  <text x="840" y="326" text-anchor="middle" font-size="10" fill="#64748b">TWC CSVs, applications</text>

  <!-- arrows -->
  <line x1="200" y1="206" x2="375" y2="206" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="580" y1="190" x2="755" y2="108" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="580" y1="206" x2="755" y2="206" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="580" y1="222" x2="755" y2="306" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

</svg>